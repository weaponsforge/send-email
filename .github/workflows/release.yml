name: Deploy Release

# This workflow will trigger on any tag/release created from the `main` branch
on:
  release:
    types: [published]

jobs:
  lint-test-app:
    name: Lint and Test App
    if: github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    env:
      GOOGLE_USER_EMAIL: ${{ secrets.GOOGLE_USER_EMAIL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Use NodeJS v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          registry-url: https://registry.npmjs.org/

      - name: Install Dependencies
        run: |
          cd app
          npm ci

      - name: Lint
        run: |
          cd app
          npm run lint

      - name: Transpile
        run: |
          cd app
          npm run transpile:noemit

      - name: Test
        run: |
          cd app
          npm test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/html/junit.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: app/html/junit.xml
          check_name: "Test Results"

  build-sea:
    name: Build and Package App
    if: github.event.release.target_commitish == 'main'
    needs: [lint-test-app]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Use NodeJS v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('app/package-lock.json') }}
          restore-keys: npm-

      - name: Install Dependencies and lint
        run: |
          cd app
          npm ci

      - name: Packge and archive the executable files
        run: |
          cd app
          chmod u+x ./scripts/build-sea-win.sh
          ./scripts/build-sea-win.sh
          cd build
          ls -l -a
          mkdir -p dist
          mv sendemail.exe dist/

      - name: Archive Development Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: app/build/dist/
          retention-days: 1

  release-binaries:
    name: Release Built Binary
    if: github.event.release.target_commitish == 'main'
    needs: [lint-test-app, build-sea]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Prepare App
        run: |
          mv sendemail.exe sendemail_${{github.ref_name}}.exe
          tar cvfz sendemail_${{github.ref_name}}.tar.gz sendemail_${{github.ref_name}}.exe
          ls -l -a

      - name: Attach Artifact to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            sendemail_${{github.ref_name}}.tar.gz

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build-push:
    name: Build and Push Docker Image
    if: github.event.release.target_commitish == 'main' && vars.DOCKERHUB_USERNAME != ''
    needs: [lint-test-app, build-sea]
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      IMAGE_NAME: weaponsforge/sendemail
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker Image Tags and Labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            # type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            CACHEBUST=${{ github.run_id }}

      - name: Scan Image for Vulnerabilities
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Scan Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
